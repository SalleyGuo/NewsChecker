<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AI 新聞查證分析工具</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="page">
    <section class="hero">
      <div class="badge">Automated News Fact-Checking and Analysis System</div>

      <h1>自動化新聞查證分析系統</h1>

      <p class="description">
        請貼上一段新聞內容或社群轉傳訊息，系統將自動擷取核心主張、
        比對相關證據，並產生初步查核分析結果。
      </p>
    </section>

    <section class="card">
      <label for="newsText" class="label">新聞或轉傳訊息內容</label>

      <textarea
        id="newsText"
        placeholder="請在此貼上新聞文字、社群貼文或通訊軟體轉傳內容..."
      ></textarea>

      <button id="submitBtn">
        開始查證分析
      </button>

      <div id="status" class="status"></div>
    </section>

    <section id="resultSection" class="result-card hidden">
      <h2>查核分析結果</h2>
      <div id="resultText" class="report-container"></div>
    </section>

    <footer>
      分析結果僅供初步參考，請務必進一步查證相關資訊來源以確認真實性。
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
